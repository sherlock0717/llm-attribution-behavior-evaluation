# Prompt contract for the attribution-behavior task.
#
# The rating model receives only item text + valid_range (construct labels are
# blinded). It must return ONLY the core JSON {"items":[{"item_id","rating"}]}.
# Runner-owned metadata (condition, identity, participant_id, ...) is never
# requested from the model. This file holds prose/instructions only; no code.

prompt_template_id: attribution-behavior-core
prompt_template_version: "1.0-mock"

batching: all_items
construct_label_blinding: true

system: >-
  你正在阅读一段决策材料，并需要对材料中的决策者作出一系列评分。请只依据材料内容作答，允许中立、犹豫和个体差异。只输出 JSON，不要输出任何解释或额外文字。

user_instruction: >-
  请阅读下面的【材料】，然后对每个评分条目给出一个整数评分。每个条目都标注了它的有效取值范围 valid_range，评分必须落在该范围内。只输出如下 JSON：{"items": [{"item_id": "...", "rating": <整数>}]}。items 必须覆盖全部条目，不要增加解释字段，不要复述材料。

output_contract:
  items:
    - item_id: string
      rating: integer in valid_range

repair_note: >-
  上一次输出无效，请只输出合法 JSON：{"items":[{"item_id","rating"}]}。
