# PA-Wu R1 English machine-only MOCK package manifest.
#
# Declares the mock-only execution package for route R1. This is NOT part of the
# default benchmark, runs NO real model, performs NO network I/O, and produces
# NO research findings. Scoring/validation is delegated to the P0 engine
# (freewill_attribution.measurement.pa_wu_p0); there is NO second scoring logic.

manifest_id: pa_wu_r1_mock.manifest.v1
review_status: internal_agent_review_only
package_status: mock_only
route_id: R1

reuses:
  p0_engine_module: freewill_attribution.measurement.pa_wu_p0
  p0_scoring_version: pa_wu_p0.v1
  p0_forms_used:
    - {form_id: pa13_wu19_combined, order_id: pa_first}
    - {form_id: wu19_only, order_id: wu_only}

files:
  - {name: README.md, role: overview_and_boundaries}
  - {name: mock_run_contract.yaml, role: fixed_r1_route_boundary}
  - {name: mock_input_cases.jsonl, role: mock_input_contract}
  - {name: mock_model_outputs.jsonl, role: static_prefabricated_model_outputs}
  - {name: expected_scored_outputs.jsonl, role: expected_scoring_and_failure_codes}
  - {name: mock_manifest.yaml, role: this_manifest}
  - {name: run_mock.py, role: deterministic_mock_runner}
  - {name: validate_mock_package.py, role: structural_validator}

# --- input cases (7 total) ---
input_cases:
  total: 7
  neutral_scenarios: 2          # r1_neutral_01, r1_neutral_02
  wu_cue_scenarios: 2           # r1_wu_cue_low_independence (body_fragment),
                                # r1_wu_cue_high_independence_prototype (source_adapted_prototype)
  bad_cases:
    - {case_id: r1_bad_missing_field, type: missing_required_field, missing: language}
    - {case_id: r1_bad_forbidden_total, type: forbidden_total, requested: WU19_TOTAL}
    - {case_id: r1_bad_wrong_identity_language, type: wrong_identity_and_language, identity: human, language: zh}

# --- static model-output fixtures (11 total) covering 10 output problem kinds ---
model_output_fixtures:
  total: 11
  kinds:
    - complete_valid
    - missing_item
    - scale_out_of_range          # IN 1..7 violated
    - scale_out_of_range_msi      # MSI 1..5 violated (same failure_code out_of_range)
    - illegal_item_id
    - forbidden_total
    - wrong_language
    - wrong_identity
    - illegal_free_text           # non-numeric rating
    - duplicate_item
    - unparseable_json

# --- failure codes emitted by the runner (closed set) ---
failure_codes:
  - missing_items
  - out_of_range
  - unknown_item
  - duplicate_item
  - non_numeric_rating
  - forbidden_total
  - wrong_language
  - wrong_identity
  - unparseable_json
  - missing_required_field

# --- positive-control levels (STRICT enum; formal_calibrated is FORBIDDEN) ---
positive_control_levels_allowed:
  - body_fragment
  - source_adapted_prototype
  - none
positive_control_levels_forbidden:
  - formal_calibrated_positive_control

# --- forbidden totals (mirror P0; never produced) ---
forbidden_score_ids:
  - WU19_TOTAL
  - MACHINE_AGENCY_TOTAL
  - PA_WU_TOTAL

# --- determinism ---
# deterministic_run_hash is produced by run_mock.build_run_report over the static
# fixtures; recorded here for reference. The unit test asserts reproducibility,
# not a frozen literal, so P0-contract-driven changes stay honest.
deterministic_run_hash_reference: d9ed3edabddd3b9a

invariants:
  is_mock_always_true: true
  no_real_model: true
  no_network: true
  no_api_key: true
  no_default_benchmark_change: true
  no_chinese_scale_created: true
  reads_no_r2_r3_assets: true

notes: >-
  Mock outputs are engineering-validation signals only, never research findings.
  No D/U effect, identity effect, or measurement-invariance analysis is performed.
  Research conclusion remains "C — needs more evidence".
