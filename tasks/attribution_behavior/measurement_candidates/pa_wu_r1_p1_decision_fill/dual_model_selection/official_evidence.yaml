# 官方公开证据登记（仅限提供商官方文档）。
#
# 严格规则：
# - 只登记与合同字段直接相关的必要事实，不复制大段官方网页原文；
# - "公开页面已读取"（confirmed_official_documentation）与"账户权限/实际接口表现
#   尚未确认"（requires_account_check / requires_interface_check）是不同状态，不得混同；
# - 页面存在 != 研究用途条款审查已完成；只有逐项确认的具体条款才可标 confirmed；
# - 每个 source 必须声明 supports_fields（其直接支持的字段/子声明或风险 claim ID）；
#   field_evidence 引用某来源时，该字段/子声明/风险必须在该来源 supports_fields 内；
#   provider 一致不足以证明来源正确，provider_generic 也不代表支持所有字段；
# - 同一 canonical_url 可被不同 claim 引用，但不得仅为不同字段复制成多个虚构 source；
#   source_id / page_title 必须描述真实官方页面，不得用 pricing_snapshot / snapshot_seed
#   等人为页面名称；
# - 官方未明确说明的字段进入 unresolved_fields，并在 field_evidence 给出 reason；
# - 不得用模型规格推导任务质量结论。

