#
# 严格规则：
# - 只登记与合同字段直接相关的必要事实，不复制大段官方网页原文；
# - 官方文档未明确说明的字段必须进入对应模型的 unresolved_fields；
# - 不得用常识或其他模型经验补齐；exact snapshot 无法确认时不得虚构日期版本；
# - 公开 model ID 存在 != 账户一定可访问；结构化输出被支持 != 本任务中稳定；
# - 上下文与价格不构成质量评分依据；不记录任何实际任务效果结论。
#
# 由于本登记在离线环境下建立、无法逐页联网核验 deepseek-v4-pro 与 gpt-5.6-terra
# 的确切快照/价格/区域可用性，凡未能从官方文档明确确认的字段一律标注为待核验
# （requires_account_check / requires_interface_check / unresolved），绝不虚构。

