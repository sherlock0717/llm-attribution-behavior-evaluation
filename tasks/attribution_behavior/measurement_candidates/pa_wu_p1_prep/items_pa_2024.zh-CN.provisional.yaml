    source_text_en: "Imagine the robot/character/person was asked to be an actor in a local theater production. How well do you think they would do?"
    translation_pass_a: "想象这个机器人/角色/人被邀请在当地一场戏剧演出中担任演员。你认为他/它会表现得如何？"
