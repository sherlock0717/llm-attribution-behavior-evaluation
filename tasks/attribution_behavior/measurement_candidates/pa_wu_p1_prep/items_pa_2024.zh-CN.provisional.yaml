    source_text_en: "can create new goals"
    translation_pass_a: "能够创造新的目标"
    translation_pass_b: "可以设立新目标"
    reconciled_zh_cn: "能够创造新的目标"
    back_translation_en: "can create new goals"
    reconciliation_notes: >-
      A/B 分歧点：create=创造/设立。取'创造'更贴近 create 的生成含义；保留'能够'(can)的能力型语气，
      不改成单次行为。此题属 PA5 成员，翻译分歧相对较大。
    construct_change_flag: none
    material_evidence_risk: partial
    adaptation_status: none
    review_status: internal_agent_review_only

  - instrument_id: pa_2024
    source_item_id: pa_can_communicate
    scale_type: likert_5
    source_text_en: "can communicate with people"
    translation_pass_a: "能够与人交流"
    translation_pass_b: "可以和人们沟通"
    reconciled_zh_cn: "能够与人交流"
    back_translation_en: "can communicate with people"
    reconciliation_notes: "communicate=交流/沟通，取'交流'；保留'能够'。"
    construct_change_flag: none
    material_evidence_risk: partial
    adaptation_status: none
    review_status: internal_agent_review_only

  - instrument_id: pa_2024
    source_item_id: pa_treats_others_as_minded
    scale_type: likert_5
    source_text_en: "treats others as if they had a mind"
    translation_pass_a: "对待他人时把他们当作有心智的存在"
    translation_pass_b: "把别人当作拥有心智的对象来对待"
    reconciled_zh_cn: "对待他人时把他们当作有心智的存在"
    back_translation_en: "treats others as beings that have a mind"
    reconciliation_notes: >-
      翻译分歧较大：as if they had a mind 的虚拟'仿佛拥有心智'。协调后保留'当作有心智的存在'，
      注意不要丢失'把他人视为有心智'这一 mind-attribution 含义（与 MSI 心理状态推断相关但不同层）。
    construct_change_flag: none
    material_evidence_risk: unsupported_extrapolation
    adaptation_status: none
    review_status: internal_agent_review_only

  - instrument_id: pa_2024
