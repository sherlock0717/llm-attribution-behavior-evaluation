# PA 2024 (Perception of Agency) — INTERNAL PROVISIONAL Chinese translation.
#
# internal provisional translation ONLY. NOT a validated Chinese scale, NOT an
# expert-reviewed translation, NOT a human-validated measure.
# Produced by internal_agent_dual_pass (see translation_protocol.yaml).
#
# Source English (source_text_en) is copied from the P0 verbatim file
# ../pa_wu_p0/items_pa_2024.yaml and MUST match it exactly. This file does NOT
# modify the P0 English items. reconciled_zh_cn is a LITERAL translation only;
# any project-facing rewording lives in adaptation_candidates.yaml.
#
# PA membership (PA13/PA8/PA5), the 5-point scale and the two anchor types are
# preserved from P0. The attention-check item is NOT a scored item and is not
# translated here (it can never enter the PA total).

instrument_id: pa_2024
language: zh-CN
status: internal_provisional_translation
review_status: internal_agent_review_only
protocol: pa_wu_p1_prep.internal_agent_dual_pass.v1

# Scale preserved from P0 (5-point). scale_type recorded per item.
response_scale:
  likert_5:
    min: 1
    max: 5
    note_en: "1=Strongly Disagree ... 5=Strongly Agree"
    note_zh_cn: "1=非常不同意 …… 5=非常同意"
  scenario_5:
    min: 1
    max: 5
    note_en: "scenario items anchored 1=terrible ... 5=great"
    note_zh_cn: "情境题锚点 1=非常糟糕 …… 5=非常好"

# material_evidence_risk is an INTERNAL PROVISIONAL material-evidence coding only,
# NOT a content-validity conclusion. Values:
#   direct                  - current D/U materials directly show this cue
#   partial                 - materials partially / indirectly touch this cue
#   identity_prior          - largely carried by the AI/human identity prior, not the act
#   unsupported_extrapolation - no material support; would be an extrapolation

items:
  - instrument_id: pa_2024
    source_item_id: pa_acts_with_purpose
    scale_type: likert_5
    source_text_en: "acts with purpose"
    translation_pass_a: "有目的地行动"
    translation_pass_b: "带着目的去行动"
    reconciled_zh_cn: "有目的地行动"
    back_translation_en: "acts with a purpose"
    reconciliation_notes: "A/B 一致，取 A 更简洁；保留'目的'不引申为'目标计划'（避免污染 goal-orientation）。"
    construct_change_flag: none
    material_evidence_risk: partial
    adaptation_status: none
    review_status: internal_agent_review_only

  - instrument_id: pa_2024
    source_item_id: pa_has_goals
    scale_type: likert_5
    source_text_en: "has goals"
    translation_pass_a: "有目标"
    translation_pass_b: "拥有目标"
    reconciled_zh_cn: "有目标"
    back_translation_en: "has goals"
    reconciliation_notes: "A/B 近同；'有目标'为能力/属性型陈述，不改成'在本次事件中设定了目标'。"
    construct_change_flag: none
    material_evidence_risk: partial
    adaptation_status: none
    review_status: internal_agent_review_only

  - instrument_id: pa_2024
