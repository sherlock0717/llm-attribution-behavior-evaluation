    translation_pass_a: "想象这个机器人/角色/人被要求在下周末为你的朋友们主持一场晚宴。你认为他/它会做得如何？"
    translation_pass_b: "设想该机器人/角色/人被请在下个周末为你的朋友举办一次晚宴，你觉得他/它会做得怎样？"
    reconciled_zh_cn: "想象这个机器人/角色/人被要求在下周末为你的朋友们主持一场晚宴。你认为他/它会做得如何？"
