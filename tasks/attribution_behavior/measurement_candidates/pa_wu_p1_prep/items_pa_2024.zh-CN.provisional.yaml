    reconciled_zh_cn: "想要执行这些行动"
    back_translation_en: "wanted to perform these actions"
    reconciliation_notes: "wanted=想要(愿望/意愿)，保留意愿含义，不引申为 intention/意向性。"
    construct_change_flag: none
    material_evidence_risk: identity_prior
    adaptation_status: none
    review_status: internal_agent_review_only

