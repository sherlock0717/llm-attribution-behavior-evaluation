    reconciled_zh_cn: "想象这个机器人/角色/人被邀请在当地一场戏剧演出中担任演员。你认为他/它会表现得如何？"
    back_translation_en: "Imagine this robot/character/person was invited to act in a local theater production. How well do you think they would do?"
    reconciliation_notes: >-
      PA 想象题，PA5/PA8 成员，必须完整保留（不得删除想象题）。保留 robot/character/person
