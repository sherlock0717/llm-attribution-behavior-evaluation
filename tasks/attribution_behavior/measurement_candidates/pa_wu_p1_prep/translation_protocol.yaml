# internal_agent_two_pass_translation protocol for the PA-Wu P1 prep package.
#
# THIS IS NOT human dual-translation, NOT an expert committee review, and NOT a
# target-population cognitive interview. It is an internal-agent procedure that
# produces an INTERNAL PROVISIONAL TRANSLATION only.
#
# HONESTY / PROVENANCE NOTE (important):
# The two Chinese renderings (translation_pass_a / translation_pass_b) come from
# TWO internal-agent translation passes. We do NOT provide verifiable isolation
# evidence (no pass_a_context_id, no pass_b_context_id, no source_input_hash, no
# proof that pass B could not see pass A). Therefore we DO NOT claim these are
# statistically or procedurally INDEPENDENT translations. "second translation
# pass" means a second rendering, not a blinded independent re-translation.

protocol_id: pa_wu_p1_prep.internal_agent_two_pass_translation.v1
translator: internal_agent
review_status: internal_agent_review_only

provenance:
  method: internal_agent_two_pass_translation
  independence_claim: false
  isolation_evidence_available: false
  pass_a_context_id: null
  pass_b_context_id: null
  source_input_hash: null
  note: >-
    两套译文来自内部 Agent 两次翻译过程，但不声称统计或程序意义上的独立翻译。

disclaimers:
  not_human_dual_translation: true
  not_expert_committee_review: true
  not_target_population_cognitive_interview: true
  not_independent_re_translation: true
  produces_only: internal_provisional_translation
  validated_chinese_scale: false
  human_validated_measure: false

procedure:
  - step: pass_a
    name: "Pass A — literal per-item translation"
    goal: "faithful literal rendering; preserve construct and scale direction"
    field: translation_pass_a
  - step: pass_b
    name: "Pass B — second translation pass"
    goal: "a second rendering of each item (NOT a blinded independent re-translation)"
    field: translation_pass_b
  - step: reconciliation
    name: "Reconciliation — item-by-item comparison of the two passes"
    goal: "compare pass A / pass B per item; choose or merge into reconciled_zh_cn; record notes"
    fields: [reconciled_zh_cn, reconciliation_notes]
  - step: back_translation
    name: "Back translation — reconciled_zh_cn back to English"
    goal: "translate the reconciled Chinese back to English"
    field: back_translation_en
  - step: source_comparison
    name: "Source comparison — flag drift vs original English"
    goal: "compare back_translation_en with source_text_en; flag construct change"
    field: construct_change_flag
  - step: internal_agent_multiview_review
    name: "Internal agent multi-view review"
    views:
      - semantic_fidelity            # 语义忠实度
      - chinese_comprehensibility    # 中文可理解性
      - construct_contamination      # 构念污染
      - ai_human_parallel_risk       # AI/human 平行风险
      - du_material_anchor_risk      # D/U 材料锚定风险

# Two DISTINCT status contracts for the two layers (NOT one shared enum).
literal_translation:
  adaptation_status_allowed: [none]

adaptation_candidates:
  status_allowed: [candidate_unvalidated]

layering_rules:
  reconciled_zh_cn_is_literal_only: true
  adaptations_go_to: adaptation_candidates.yaml
  forbidden_in_reconciled_zh_cn:
    - add_information_for_du_not_in_source
    - rename_machine_to_generic_decider
    - turn_capacity_item_into_single_event_item
    - delete_pa_imagination_items
    - merge_wu_four_constructs
    - expand_free_will_into_general_agency
    - rewrite_subject_for_ai_human_parallel

required_item_fields:
  - instrument_id
  - source_item_id
  - source_text_en
  - translation_pass_a
  - translation_pass_b
  - reconciled_zh_cn
  - back_translation_en
  - reconciliation_notes
  - construct_change_flag
  - adaptation_status
  - review_status
