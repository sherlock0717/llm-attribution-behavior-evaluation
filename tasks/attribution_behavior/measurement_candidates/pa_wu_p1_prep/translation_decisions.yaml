# Item-level translation-divergence and reconciliation decisions (summary).
#
# This records where Pass A and Pass B diverged most and how reconciliation
# resolved it. It complements the per-item reconciliation_notes in the two
# provisional translation files. internal provisional only.

decisions_id: pa_wu_p1_prep.translation_decisions.v1
review_status: internal_agent_review_only
method: internal_agent_two_pass_translation   # 两次内部翻译，不声称独立翻译

pa_largest_divergences:
  - source_item_id: pa_treats_others_as_minded
    source_text_en: "treats others as if they had a mind"
    divergence: "as if they had a mind 的假设/行为姿态处理。"
    resolution: >-
      语义漂移返修：改为'对待他人时，就好像他们拥有心智一样'，保留 as if 的'就好像……一样'，
      不再直接断言他人确实具有心智；回译回到 treats others as if they had a mind。
    residual_risk: "行为姿态(treats ... as if) 与 MSI 对心智的客观归因不同层，翻译已保留假设语气。"
  - source_item_id: pa_can_create_new_goals
    source_text_en: "can create new goals"
    divergence: "create=创造 vs 设立；能力型 can 的保留。"
    resolution: "取'能够创造新的目标'，保留 can 的能力语气，不改成单次事件。"
    residual_risk: "'目标'与 Wu goal-orientation 措辞相近，但属 PA，不合并。"
  - source_item_id: pa_actor_scenario
    source_text_en: "Imagine ... be an actor ... How well ... would do?"
    divergence: "想象题的框架与 robot/character/person 三元并列。"
    resolution: "完整保留想象框架与三元并列（PA 想象题不得删除）。"
    residual_risk: "与当前 D/U 材料不匹配（material_evidence_risk=unsupported_extrapolation），但先保留。"

wu_largest_divergences:
  - source_item_id: GO1a
    source_text_en: "The machine acted purposefully rather than merely behaving."
    divergence: "purposefully vs merely behaving 的对比；behaving 与 acted 的区分。"
    resolution: "'有目的地行动，而不只是单纯地表现出行为'——必须保留对比，否则丢目标导向线索。"
    residual_risk: "'表现出行为'略显书面，但保留了 behaving≠acting 的核心。"
  - source_item_id: IN3b
    source_text_en: "The machine's actions resulted from itself rather than other entities."
    divergence: "resulted from itself rather than other entities 的因果归属对比。"
    resolution: "'源于其自身，而非其他实体'，保留独立性因果线索。"
    residual_risk: "'实体'与 IC 的'能动主体/entity'措辞相邻，术语表已区分。"
  - source_item_id: IC8
    source_text_en: "The machine is an agentic entity with the power to make a difference."
    divergence: "make a difference 的中文（产生影响 vs 带来不同）。"
    resolution: "取'产生影响'更自然，直译'带来不同'记入 notes。"
    residual_risk: "IC 系列高度平行，需保持统一译式，已统一。"
  - source_item_id: MS2
    source_text_en: "Thinking (cannot think – does think)."
    divergence: "does think 的中文：'会思考' vs '能够思考' vs '确实在思考'。"
    resolution: >-
      does think 是对'能思考'的强调性肯定（存在/事实性），既非能力问句也非进行态。
      '能够思考'=capacity（可能性），偏离；'确实在思考'=ongoing（此刻进行），偏离；
      '会思考'=倾向/事实性肯定，最贴近 does think。最终取'会思考'。
    residual_risk: "中文'会'兼有能力与倾向义，仍略含能力色彩，但在 MSI 语义差异语境下方向明确（低=不能思考/高=会思考）。"

cross_tool_terminology_notes:
  - note: "PA 的 has goals / create new goals 与 Wu 的 goal-orientation 措辞相邻，但属不同工具、不同层，翻译刻意不统一措辞以免暗示合并。"
  - note: "agency/能动性（构念名）与 agentic entity/能动主体（IC 句内名词）同源但分开记录，见 terminology_glossary.yaml。"
  - note: "free will 仅作 MSI3 单指标，未扩展为总体 agency。"
