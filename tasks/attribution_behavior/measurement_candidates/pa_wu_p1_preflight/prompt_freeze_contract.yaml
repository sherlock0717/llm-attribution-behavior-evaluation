# Prompt 冻结合同。
# Prompt 任一部分变化都必须生成新的 run_version；Prompt hash 不一致时禁止执行。
# 只要存在未冻结字段，P1 必须保持 blocked。

prompt_freeze_id: pa_wu_p1_preflight.prompt_freeze.v1

# 硬性行为约束（不可协商）。
constraints:
  request_hidden_reasoning: false        # 不要求模型输出隐藏推理过程
  request_structured_final_scores_only: true  # 只请求结构化最终评分
  item_wording_source: pa_wu_p0          # item wording 来自 P0，不得改写
  scenario_model_rewrite_allowed: false  # scenario 不得被模型自行改写
  identity_presented: machine            # identity 只呈现 machine 版本
  change_requires_new_run_version: true  # 任一部分变化必须生成新 run_version
  block_on_prompt_hash_mismatch: true    # Prompt hash 不一致时禁止执行

# 分段。每段初始 frozen: false —— 存在未冻结段则 P1 保持 blocked。
segments:
  system_prompt:
    content: null
    template_reference: null
    sha256: null
    frozen: false
    owner: null
    change_requires_new_run_version: true
  task_instruction:
    content: null
    template_reference: null
    sha256: null
    frozen: false
    owner: null
    change_requires_new_run_version: true
  scenario_block:
    content: null
    template_reference: null
    sha256: null
    frozen: false
    owner: null
    change_requires_new_run_version: true
  identity_block:
    content: null
    template_reference: null
    sha256: null
    frozen: false
    owner: null
    change_requires_new_run_version: true
  response_schema:
    content: null
    template_reference: null
    sha256: null
    frozen: false
    owner: null
    change_requires_new_run_version: true
  # item_block 必须绑定完整 P0 来源束（固定顺序），不允许 inline content 或单文件
  # template_reference 替代。source_bundle 覆盖 combined 与 wu19_only 两条来源：
  #   - pa_wu_p0/items_pa_2024.yaml
  #   - pa_wu_p0/items_wu_shen_2026.yaml
  #   - pa_wu_p0/forms.yaml
  # sha256 冻结时必须等于该束的复合哈希（每个文件的相对路径 + 规范化 UTF-8 内容，
  # 对规范化 JSON 计算 SHA-256）。任一 P0 文件内容变化、集合缺失/多余/乱序、或引用
  # 其他 P0 文件（如 README.md / manifest.yaml），门禁必失败。
  item_block:
    content: null
    template_reference: null
    source_bundle:
      - pa_wu_p0/items_pa_2024.yaml
      - pa_wu_p0/items_wu_shen_2026.yaml
      - pa_wu_p0/forms.yaml
    sha256: null
    frozen: false
    owner: null
    change_requires_new_run_version: true

# template_reference 解析白名单（相对 repo 的本地资产根，禁止逃逸）：
#   - pa_wu_p0/*          （P0 来源，item_block 必须来自此处）
#   - pa_wu_p1_preflight/templates/*  （本包受控 prompt 模板）
template_reference_allowed_roots:
  - pa_wu_p0
  - pa_wu_p1_preflight/templates

notes: >-
  初始允许保留未冻结字段，但只要任一 segment.frozen 为 false，preflight 与 P1 都保持
  blocked。冻结时每段必须恰有 content 或 template_reference 之一；template_reference 必须
  解析到白名单目录内的真实本地文件，且 sha256 与其规范化内容一致。item_block 只允许
  template_reference（P0 来源），不允许 inline content。scenario_block 若用
  template_reference 也必须解析真实本地文件；在正式 scenario 资产不存在前保持未冻结。
