      site_file: "assets/figures/mean_agency.png"
      title_zh: "行动者感（agency）按决策过程条件的均值"
      alt_zh: "六个决策过程条件下 agency 均值的柱状图"
      read_note_zh: "行动者感从直接选择到反思反馈总体抬升，是趋势最清晰的一张。"
    - id: "mean-free-will-attribution"
      source_file: "outputs/plots/mean_free_will_attribution.png"
      site_file: "assets/figures/mean_free_will_attribution.png"
      title_zh: "自由意志归因按决策过程条件的均值"
      alt_zh: "六个决策过程条件下自由意志归因均值的柱状图"
      read_note_zh: "自由意志的条件差异比行动者感平缓，呼应“直接效应不稳定”。"
    - id: "mean-subjective-process-completeness"
      source_file: "outputs/plots/mean_subjective_process_completeness.png"
      site_file: "assets/figures/mean_subjective_process_completeness.png"
      title_zh: "主观过程完整性按决策过程条件的均值"
      alt_zh: "六个决策过程条件下主观过程完整性均值的柱状图"
      read_note_zh: "作为操纵检验，高结构条件的过程完整性整体高于低结构条件。"

