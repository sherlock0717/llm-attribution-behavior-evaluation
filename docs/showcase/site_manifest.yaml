      - "限制：持续集成为 configured, remote verification pending；历史基线保持不变"
      - "与下一版差异：还没有正式可追溯 runner，无法重放历史运行"
    is_future: false
  - version: "next"
    title_zh: "Next：研究协议冻结与可追溯 runner"
    highlights_zh:
      - "计划：冻结 v1/v2 研究协议、假设、条件与解析契约"
      - "计划：正式 runner + RunManifest + resolved config + prompt/hash 快照"
      - "目标：让一次运行可被逐步骤审计，而不只是数据来源可信"
    is_future: true
  - version: "future"
    title_zh: "Future：多模型执行与 benchmark 方向"
    highlights_zh:
      - "方向：provider 抽象与多模型执行矩阵"
      - "方向：benchmark track（长期方向，非当前能力，未经批准不提前执行）"
    is_future: true

