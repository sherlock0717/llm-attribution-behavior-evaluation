research_question:
  paragraphs_zh:
    - "自由意志归因：当我们看到某个对象做出选择时，会不自觉地判断它是不是在“自己做主”——是否有能力权衡、是否可以做出别的选择、是否要为结果负责。这是一种观察者的主观归因，而不是关于对象内部是否“真的自由”的事实结论。"
    - "为什么比较 AI 与人类决策者：同一段决策过程，贴上“AI 决策者”或“人类决策者”标签后，观察者的归因可能不同。"
    - "为什么改变过程描述：决策者可以只给结论，也可以展示候选方案、理由权衡、反思与修正。项目系统改变这种“决策过程”结构，观察它是否比单纯文本长度更能影响归因。"
    - "重要说明：项目测量的是模型输出的归因行为，不是在证明模型拥有自由意志，也不是在测量真实人类的心理规律。"

experimental_design:
  intro_zh: "6 × 2 设计，每格样本量固定，合计为历史记录总数（具体数字见页面动态数据）。"
  process_conditions:
    - key: "direct_choice"
      label_zh: "直接选择"
      note_zh: "只给出最终选择，最低结构，作为基线"
    - key: "direct_choice_long"
      label_zh: "长文本直接选择"
      note_zh: "拉长文本但不加入真正理由结构，用于分离文本长度效应"
    - key: "alternatives"
      label_zh: "列出可选方案"
      note_zh: "呈现多个候选行动"
    - key: "reasons_concise"
      label_zh: "简洁理由权衡"
      note_zh: "较短文本中的理由权衡"
    - key: "reasons"
      label_zh: "完整理由权衡"
      note_zh: "较完整的理由比较"
    - key: "reflection_feedback"
      label_zh: "反思与反馈修正"
      note_zh: "理由 + 反思 + 反馈修正，最高结构"
  identity_labels_zh:
    - "AI 决策者"
    - "人类决策者"
  diagnostic_note_zh: "direct_choice_long 与 reasons_concise 是诊断条件，用于区分文本长度效应与决策结构效应。"
  data_note_zh: "数据来源为历史 DeepSeek API 基线（真实 API 调用生成的模型响应）。mock（规则生成）仅用于工程与持续集成流程测试，不进入研究结果。"

# Pipeline 分三层：历史研究路径（真实跑过）/ 当前工程层（v0.2 组件）/ 规划。
# 注意：configs/ 与 src/freewill_attribution/ 属当前工程组件，不得标为历史运行步骤；
# configs/prompt.v1.yaml 是当前配置组件，不能替代缺失的历史精确 prompt snapshot/hash。
pipeline_historical:
  - label_zh: "条件与刺激"
    kind: "historical"
    ref: "src/stimuli.py / src/scales.py"
  - label_zh: "Prompt 构造"
    kind: "historical"
    ref: "历史运行脚本；exact prompt snapshot/hash unavailable"
  - label_zh: "DeepSeek API 响应"
    kind: "historical"
    ref: "历史运行"
  - label_zh: "解析与量表记录"
    kind: "historical"
    ref: "outputs/scale_scores.csv"
  - label_zh: "分析与报告"
    kind: "historical"
    ref: "outputs/*.md、outputs/plots/"

pipeline_engineering_layer:
  - label_zh: "Package / safe paths / wrapper"
    kind: "completed"
    ref: "src/freewill_attribution/、scripts/run_all.*"
  - label_zh: "Schema / config"
    kind: "partial"
    ref: "configs/（未接入正式 runner）"
  - label_zh: "站点数据导出 / 静态展示页"
    kind: "current"
    ref: "site/、scripts/build_site_data.py"

pipeline_planned:
  - label_zh: "正式 runner / RunManifest / provider abstraction"
    kind: "planned"

evidence_limitations_zh:
  - "历史记录是历史真实 DeepSeek API 输出（模型生成的观察者评分），不是 mock。"
  - "mock（规则生成数据）只用于验证工程流程与持续集成，不进入研究结论。"
  - "历史运行的 provenance（溯源元数据）不完整：缺少完整运行清单、服务端精确模型版本、时间戳、token、费用、prompt 哈希、依赖锁定哈希、完整环境快照与调用日志；原始逐条响应文件不在公开仓库。"
  - "数据真实性不等于完全可复现：数据来源真实已确认，但历史运行级元数据缺失，无法逐字节重放当时的模型响应。"
  - "当前不是多模型 benchmark：结果来自单一模型（DeepSeek）与单一 prompt 模板。"
  - "当前不包含人类被试验证：无内容效度、EFA/CFA、区分效度或测量等价性检验。"
  - "历史 prompt 同时暴露构念名、题项与判断规则，模型可能迎合提示。"
  - "页面所有结论仅限当前实验条件与历史模型输出，不外推为人类心理规律或所有模型的普遍规律，不构成关于 AI 是否拥有自由意志的任何断言。"

reproducibility_zh:
  completed:
    - "基线内容哈希（SHA-256 清单）"
    - "依赖锁定（uv.lock）"
    - "Python package 与命令行入口（mock-only）"
    - "安全输出隔离（显式输出目录，永不写入历史 outputs/）"
    - "数据模型（schema）与配置加载"
    - "单元 / 集成 / 特征化测试"
    - "跨平台运行脚本（PowerShell 与 Bash）"
    - "持续集成配置（Windows 与 Linux 矩阵）"
  ci_statement_zh: "持续集成为 configured, remote verification pending（已配置，远程验证待完成）。"
  cross_platform_statement_zh: "在 Windows 本地使用锁定依赖跑通 mock 流程；Bash wrapper 完成 Git Bash compatibility validation。真实 Linux 与 GitHub-hosted Windows/Linux 验证仍待发布阶段完成。不得把 Git Bash 称为 Linux 验证。"

