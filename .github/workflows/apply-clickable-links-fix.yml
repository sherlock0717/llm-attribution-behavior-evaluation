name: Apply clickable links fix

on:
  push:
    branches:
      - fix/clickable-document-links

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/clickable-document-links
          fetch-depth: 0

      - name: Apply focused patch
        run: python scripts/apply_clickable_links_fix.py

      - name: Remove one-time files
        run: |
          rm scripts/apply_clickable_links_fix.py
          rm .github/workflows/apply-clickable-links-fix.yml

      - name: Run focused tests
        run: |
          python -m pip install pytest
          python -m pytest tests/site/test_static_site.py -q

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/assets/js/site.js tests/site/test_static_site.py
          git add -u scripts/apply_clickable_links_fix.py .github/workflows/apply-clickable-links-fix.yml
          git commit -m "fix: make repository document paths clickable"
          git push origin HEAD:fix/clickable-document-links
