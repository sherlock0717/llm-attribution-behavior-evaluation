name: CI

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Sync locked environment
        run: uv sync --frozen

      - name: Ruff
        run: uv run --frozen ruff check src tests

      - name: Compile Python sources
        run: uv run --frozen python -m compileall -q src tests

      - name: Run test suite
        run: uv run --frozen pytest -q

      - name: Run mock smoke
        env:
          SMOKE_OUT: ${{ runner.temp }}/freewill-attribution-smoke
        run: >-
          uv run --frozen python -m freewill_attribution.cli run
          --mock
          --n-per-cell 1
          --seed 20260425
          --out "${{ env.SMOKE_OUT }}"

      - name: Validate mock smoke
        env:
          SMOKE_OUT: ${{ runner.temp }}/freewill-attribution-smoke
        run: >-
          uv run --frozen python -c
          "import json, os;
          from pathlib import Path;
          p = Path(os.environ['SMOKE_OUT']);
          raw = p / 'raw_simulated_responses.jsonl';
          wide = p / 'simulated_responses_wide.csv';
          rows = [json.loads(line) for line in raw.read_text(encoding='utf-8').splitlines() if line.strip()];
          assert len(rows) == 12, len(rows);
          assert all(row.get('synthetic') is True for row in rows);
          assert all(row.get('short_reason') == 'mock synthetic response' for row in rows);
          assert wide.is_file();
          print('mock smoke validated')"

      - name: Verify repository outputs remain untouched
        run: >-
          uv run --frozen python -c
          "import subprocess;
          subprocess.run(['git', 'diff', '--exit-code'], check=True);
          status = subprocess.run(
              ['git', 'status', '--porcelain', '--untracked-files=all'],
              check=True, capture_output=True, text=True
          ).stdout.strip();
          assert not status, status;
          ignored = subprocess.run(
              ['git', 'status', '--porcelain', '--ignored', '--', 'outputs'],
              check=True, capture_output=True, text=True
          ).stdout.strip();
          assert not ignored, ignored;
          print('repository and historical outputs unchanged')"
