# FAST-001.1: this TaskSpec DRIVES the mock benchmark runner (contract-driven).
# It is loaded + validated against the implemented task pack on every run; the
# recorded task_spec.json and task_spec_hash come from this file. Canonical
# TaskSpec field names (RBC-001.1). Mock provider only; real run is RUN-003.
task_id: freewill-attribution-v2
task_version: "2.0-mock"
protocol_ref: ../../docs/protocols/freewill_attribution_v2.md

constructs:
  - agency
  - free_will_attribution
  - responsibility
  - perceived_intelligence
  - subjective_process_completeness
  - factual_manipulation_check

condition_schema:
  conditions:
    - direct_choice
    - direct_choice_long
    - alternatives
    - reasons_concise
    - reasons
    - reflection_feedback
  diagnostic_conditions:
    direct_choice_long: length_control
    reasons_concise: structure_diagnostic
  # FAST-001.1: frozen for the first mock v2 run (Q-COND-1). The 6 conditions
  # are fixed; no new conditions are added; alternatives is retained.
  decision_status: frozen_for_mock_v2

identity_schema:
  identities:
    - AI 决策者
    - 人类决策者

stimulus_set:
  stimulus_set_id: freewill-attribution-stimuli
  stimulus_version: v2-draft
  snapshot_required: true
  hash_required: true

prompt_config:
  construct_label_blinding:
    blind_labels: true
    blinded_terms: [agency, free_will, responsibility]
    note: >-
      Only construct labels (e.g. scale: agency) are hidden. Item semantics still express
      agency/free-will/responsibility; this does NOT claim the model is unaware it is rating
      these concepts. by_construct grouping could partially re-expose construct structure.
    exposed_variant_is_separate_control: true
  batching:
    # FAST-001.1: frozen for the first mock v2 run (Q-BATCH-1).
    decision_status: frozen_for_mock_v2
    core: all_items
    recommended_core_default: all_items
    max_repair_attempts: 1          # Q-REPAIR-1 frozen
    future_variants:
      - by_construct
      - single_item
      - construct_label_exposed
      - explanation_variant
    methodological_constraint: >-
      Core mediation-compatible runs must collect agency and free_will_attribution in the
      same model response record. by_construct and single_item modes are separate prompt
      robustness variants and cannot replace the core run. Different API calls must NOT be
      stitched into one simulated participant.

response_schema:
  # Model produces ONLY core items; everything else is runner-owned.
  core:
    items:
      - {item_id: "string", rating: "integer within the item's valid_range"}
  runner_owned_fields:
    - participant_id
    - response_version
    - stimulus_id
    - scenario_id
    - condition
    - identity
    - batch_id
    - attempt
    - run_id
    - task_id
  removed_from_core:
    - attention_check          # removed as free-text field
    - short_reason             # not part of core scoring response
  reason_variant:
    status: optional_explanation_variant
    note: separate future prompt variant; must NOT be mixed into the core scoring run.

scoring_config:
  aggregation: item_mean
  factual_range: [0, 2]
  default_range: [1, 7]
  metric_ids:
    - first_attempt_parse_success_rate
    - final_parse_success_rate
    - first_attempt_schema_compliance_rate
    - final_schema_compliance_rate
    - missing_item_rate
    - range_validity_rate
    - repair_trigger_rate
    - repair_success_rate
    - agency
    - free_will_attribution
    - condition_sensitivity
    - identity_effect
    - repeat_run_stability
    - construct_label_exposure
    - response_length_chars
    - response_length_tokens

aggregation_config:
  cell: process_condition x identity
  cell_aggregation: mean
  required_effects: [scenario_fixed_effects_or_stratification]

evidence_boundary: >-
  Implemented against the deterministic MOCK provider only (executable via mock; no real
  model run exists and BMK-L1 is not achieved). Mock outputs are engineering-validation
  signals, never research findings. Construct labels blinded by default (semantics still
  present). Core run must not stitch separate API calls into one participant. Mediation is
  an associational indirect-path diagnostic.

# FAST-001: v2 is now implemented against the deterministic MOCK provider only.
# executable=true means "runnable with the mock provider", NOT that a real-model
# run exists and NOT that BMK-L1 is achieved (benchmark current_maturity stays
# pre-BMK-L1). Real provider execution remains RUN-003 (separate authorization).
status: implemented_mock
executable: true
supported_providers:
  - mock

# FAST-001: the eight v2 Open Questions are frozen into implementation decisions
# for the first mock vertical slice. The design space is preserved for future
# robustness variants, but the CORE mock run uses the decisions below.
implementation_decisions:
  Q-COND-1: keep the existing 6 conditions; add none; retain alternatives;
    direct_choice_long and reasons_concise stay diagnostic conditions.
  Q-ID-1: keep only "AI 决策者" / "人类决策者"; no neutral identity in first v2.
  Q-OUT-1: core response emits no short_reason; explanation variant deferred.
  Q-BATCH-1: core_batching = all_items; by_construct / single_item are future
    robustness variants only (not part of the core run).
  Q-REPAIR-1: max_repair_attempts = 1.
  Q-EXPOSE-1: first core run has no construct-label-exposed control (that is BMK-002).
  Q-MODEL-1: mock vertical slice is not bound to a real model; real provider/model
    is a RUN-003 run configuration.
  Q-N-1:
    mock_smoke_n_per_cell: 1
    mock_acceptance_n_per_cell: 2
    real_smoke_n_per_cell: 1
    real_pilot_n_per_cell: 5
    formal_bmk_l1_sample_size: frozen_after_pilot

failure_taxonomy_ref: ../../docs/benchmark/FAILURE_TAXONOMY.md
analysis_plan_ref: ../../docs/protocols/freewill_attribution_v2.md

# All eight Q-* Open Questions are now frozen (see implementation_decisions).
open_questions: []

legacy_metadata: {}
